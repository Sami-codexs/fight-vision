name: CI — fight-vision

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    name: Lint and validate project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile src/video/loader.py
          python -m py_compile src/video/utils.py
          python -m py_compile src/video/frame_extractor.py
          python -m py_compile config.py
          python -m py_compile main.py
          echo "All files passed syntax check"

      - name: Verify project structure
        run: |
          python - <<'EOF'
          import os, sys
          required = [
              "main.py",
              "config.py",
              "requirements.txt",
              "Dockerfile",
              "src/__init__.py",
              "src/video/__init__.py",
              "src/video/loader.py",
              "src/video/utils.py",
              "src/video/frame_extractor.py",
          ]
          missing = [f for f in required if not os.path.exists(f)]
          if missing:
              print(f"MISSING FILES: {missing}")
              sys.exit(1)
          print(f"All {len(required)} required files present.")
          EOF

      - name: Validate config values
        run: |
          python - <<'EOF'
          import sys, ast

          with open("config.py") as f:
              source = f.read()

          tree = ast.parse(source)
          values = {}
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name):
                          try:
                              values[target.id] = ast.literal_eval(node.value)
                          except Exception:
                              pass

          errors = []
          def check(name, condition, msg):
              if name in values and not condition(values[name]):
                  errors.append(f"{name}={values[name]} — {msg}")

          check("DETECTION_CONF",     lambda v: 0 < v < 1, "must be between 0 and 1")
          check("POSE_CONF",          lambda v: 0 < v < 1, "must be between 0 and 1")
          check("WRIST_SPEED_THRESH", lambda v: v > 0,     "must be > 0")
          check("STRIKE_COOLDOWN",    lambda v: v > 0,     "must be > 0")
          check("BUCKET_SIZE",        lambda v: v > 0,     "must be > 0")
          check("START_FRAME",        lambda v: v >= 0,    "must be >= 0")

          if errors:
              for e in errors: print(f"CONFIG ERROR: {e}")
              sys.exit(1)

          print("Config validation passed.")
          for k, v in values.items():
              print(f"  {k} = {v}")
          EOF

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t fight-vision:ci .
          echo "Docker build succeeded"

      - name: Verify image created
        run: docker images fight-vision:ci